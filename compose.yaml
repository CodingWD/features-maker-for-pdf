name: datasheet-builder

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: datasheet-builder:local
    container_name: datasheet-builder
    restart: unless-stopped
    init: true
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATA_DIR: /app/data
      NEXT_PUBLIC_ONLYOFFICE_DOCUMENT_SERVER_URL: "${NEXT_PUBLIC_ONLYOFFICE_DOCUMENT_SERVER_URL:-}"
      NEXT_PUBLIC_APP_PUBLIC_URL: "${NEXT_PUBLIC_APP_PUBLIC_URL:-}"
    volumes:
      - ./data:/app/data
    security_opt:
      - no-new-privileges:true
